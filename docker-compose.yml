services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: cmms_app
      POSTGRES_PASSWORD: cmms_app_test_2026
      POSTGRES_DB: cmms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmms_app -d cmms"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Secrets are sourced from a `.env` file sitting next to this compose file on
    # the host (NOT committed). At minimum it MUST define:
    #   MEDICAL_ENCRYPTION_KEY   (required — roster medical writes/seed throw without it)
    #   NEXTAUTH_SECRET          (required for auth; same value as AUTH_SECRET)
    #   NEXTAUTH_URL             (e.g. https://cmms.internal.imsda.org)
    #   RESEND_API_KEY, RESEND_FROM_EMAIL  (optional — email is a no-op without them)
    # Do NOT also list these under `environment:` below — an `environment:` entry
    # overrides `env_file`, and an unset `${VAR}` would blank them back out.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://cmms_app:cmms_app_test_2026@postgres:5432/cmms?schema=public
      POSTGRES_USER: cmms_app
      POSTGRES_PASSWORD: cmms_app_test_2026
      POSTGRES_DB: cmms
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: https://cmms.internal.imsda.org
      SEED_SUPER_ADMIN_EMAIL: ${SEED_SUPER_ADMIN_EMAIL:-superadmin@cmms.local}
      SEED_SUPER_ADMIN_PASSWORD: ${SEED_SUPER_ADMIN_PASSWORD:-ChangeMeNow123!}
      SEED_SUPER_ADMIN_NAME: ${SEED_SUPER_ADMIN_NAME:-CMMS Super Admin}
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./private-uploads:/app/private-uploads

volumes:
  postgres_data:
